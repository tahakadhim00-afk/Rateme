name: rateme
description: "Rate Me - Iraqi Movie & TV Show Rating App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP / API
  dio: ^5.8.0+1

  # Images
  cached_network_image: ^3.4.1
  palette_generator: ^0.3.3

  # Fonts
  google_fonts: ^6.2.1

  # Rating
  flutter_rating_bar: ^4.0.1

  # Shimmer loading
  shimmer: ^3.0.0

  # Local persistence
  shared_preferences: ^2.3.3

  # Supabase backend + Auth
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0

  # Sharing
  share_plus: ^10.1.3

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # YouTube player (trailer cover)
  youtube_player_iframe: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_and_images/
    - assets/app_icons/
    - assets/placeholders/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
