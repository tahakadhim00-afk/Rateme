name: rateme
description: "Rate Me - Iraqi Movie & TV Show Rating App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP / API
  dio: ^5.8.0+1

  # Images
  cached_network_image: ^3.4.1

  # Fonts
  google_fonts: ^6.2.1

  # Rating
  flutter_rating_bar: ^4.0.1

  # Shimmer loading
  shimmer: ^3.0.0

  # Local persistence
  shared_preferences: ^2.3.3

  # Supabase backend + Auth
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
